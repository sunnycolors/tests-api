name: Tests API

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Récupérer le code
              uses: actions/checkout@v4

            - name: Installer Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Installer les dépendances
              run: npm install

            - name: Lancer les tests Jest avec rapport HTML
              run: npm run test:report
              env:
                  TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}

            - name: Sauvegarder le rapport
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: rapport-tests
                  path: jest_html_reporters.html

            - name: Lancer les collections Postman avec Newman
              run: npx newman run collections/JSONPlaceholder.postman_collection.json --environment environments/dev.json
