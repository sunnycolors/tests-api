name: Tests API

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - name: Récupérer le code
              uses: actions/checkout@v4

            - name: Installer Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Installer les dépendances
              run: npm install

            - name: Lancer les tests Jest avec rapport HTML
              run: npm run test:report
              env:
                  TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}

            - name: Lancer les collections Postman avec Newman
              run: npx newman run collections/JSONPlaceholder.postman_collection.json --environment environments/dev.json

            - name: Déployer le rapport sur GitHub Pages
              uses: peaceiris/actions-gh-pages@v3
              if: github.ref == 'refs/heads/main'
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./
                  destination_dir: report
